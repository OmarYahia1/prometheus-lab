global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "10.0.138.164:9100"

  - job_name: "python_app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "10.0.136.134:5000"




